<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="soleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc4400;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ff9500;stop-opacity:0.7" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" fill="#0d1117" rx="16"/>

  <!-- Shoe sole -->
  <ellipse cx="200" cy="210" rx="155" ry="22" fill="url(#soleGrad)" filter="url(#shadow)"/>
  <!-- Sole tread marks -->
  <rect x="70" y="208" width="8" height="18" rx="2" fill="#aa3300" opacity="0.6"/>
  <rect x="90" y="206" width="8" height="20" rx="2" fill="#aa3300" opacity="0.6"/>
  <rect x="110" y="205" width="8" height="21" rx="2" fill="#aa3300" opacity="0.6"/>
  <rect x="270" y="205" width="8" height="21" rx="2" fill="#aa3300" opacity="0.6"/>
  <rect x="290" y="206" width="8" height="20" rx="2" fill="#aa3300" opacity="0.6"/>
  <rect x="310" y="208" width="8" height="18" rx="2" fill="#aa3300" opacity="0.6"/>

  <!-- Midsole (energy-return foam) -->
  <path d="M55 200 Q60 185 80 185 L320 185 Q345 185 348 200 Z" fill="#1e3a5f" opacity="0.95"/>
  <!-- Carbon fibre plate accent line -->
  <path d="M80 192 L320 192" stroke="#ff6b35" stroke-width="2.5" stroke-dasharray="none" opacity="0.8"/>

  <!-- Main upper body -->
  <path d="M60 188 Q58 155 72 130 Q90 100 130 88 L230 80 Q285 78 310 95 Q330 108 335 140 L338 188 Z"
        fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Mesh texture overlay -->
  <path d="M60 188 Q58 155 72 130 Q90 100 130 88 L230 80 Q285 78 310 95 Q330 108 335 140 L338 188 Z"
        fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.08"
        stroke-dasharray="4,4"/>

  <!-- Mesh grid lines (horizontal) -->
  <line x1="85" y1="160" x2="320" y2="155" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <line x1="78" y1="175" x2="325" y2="172" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <line x1="95" y1="145" x2="312" y2="140" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <line x1="105" y1="130" x2="305" y2="125" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <!-- Mesh grid lines (diagonal) -->
  <line x1="100" y1="88" x2="80" y2="188" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <line x1="140" y1="83" x2="118" y2="188" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <line x1="180" y1="80" x2="158" y2="188" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <line x1="220" y1="80" x2="200" y2="188" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <line x1="260" y1="81" x2="242" y2="188" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>
  <line x1="300" y1="90" x2="284" y2="188" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>

  <!-- Orange accent stripe -->
  <path d="M125 88 Q170 78 215 79 Q255 80 280 87 L275 100 Q250 94 210 93 Q170 92 128 102 Z"
        fill="url(#accentGrad)" opacity="0.85"/>

  <!-- Toe cap -->
  <path d="M60 188 Q58 155 72 130 Q82 110 100 98 L115 105 Q95 118 90 140 Q85 162 85 188 Z"
        fill="#0d1930" opacity="0.7"/>

  <!-- Heel counter -->
  <path d="M310 95 Q330 108 335 140 L338 188 L310 188 L310 155 Q310 115 308 98 Z"
        fill="#0d1930" opacity="0.6"/>

  <!-- Lacing system -->
  <line x1="155" y1="90" x2="195" y2="90" stroke="#e0e0e0" stroke-width="2" opacity="0.7"/>
  <line x1="150" y1="100" x2="195" y2="100" stroke="#e0e0e0" stroke-width="2" opacity="0.7"/>
  <line x1="148" y1="110" x2="193" y2="110" stroke="#e0e0e0" stroke-width="2" opacity="0.7"/>
  <line x1="147" y1="120" x2="193" y2="120" stroke="#e0e0e0" stroke-width="2" opacity="0.7"/>
  <!-- Lace loops -->
  <circle cx="155" cy="90" r="3" fill="#cc9900" opacity="0.9"/>
  <circle cx="195" cy="90" r="3" fill="#cc9900" opacity="0.9"/>
  <circle cx="150" cy="100" r="3" fill="#cc9900" opacity="0.9"/>
  <circle cx="195" cy="100" r="3" fill="#cc9900" opacity="0.9"/>
  <circle cx="148" cy="110" r="3" fill="#cc9900" opacity="0.9"/>
  <circle cx="193" cy="110" r="3" fill="#cc9900" opacity="0.9"/>

  <!-- Reflective heel tab -->
  <rect x="317" y="162" width="14" height="26" rx="3" fill="#888" opacity="0.5"/>
  <rect x="319" y="164" width="10" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
  <rect x="319" y="175" width="10" height="4" rx="1" fill="#aaaaaa" opacity="0.6"/>
  <rect x="319" y="182" width="10" height="4" rx="1" fill="#ffffff" opacity="0.9"/>

  <!-- Tongue -->
  <path d="M165 88 Q175 82 195 82 L198 145 Q185 148 175 145 Z"
        fill="#1a2a4a" opacity="0.8"/>

  <!-- Label text -->
  <text x="200" y="242" font-family="Arial, sans-serif" font-size="13" font-weight="700"
        fill="#ff6b35" text-anchor="middle" letter-spacing="2">AEROSTRIDE X1</text>
  <text x="200" y="257" font-family="Arial, sans-serif" font-size="9" font-weight="400"
        fill="#888888" text-anchor="middle" letter-spacing="1">RUNNING SHOE · $149.99</text>
</svg>
